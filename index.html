<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腾讯云随机数同步</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .random-num {
            font-size: 80px;
            font-weight: bold;
            color: #1677ff;
            margin: 30px 0;
            height: 100px;
            line-height: 100px;
        }
        .btn {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 10px;
        }
        .generate-btn {
            background-color: #1677ff;
            color: white;
        }
        .reset-btn {
            background-color: #ff4d4f;
            color: white;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 4px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>随机数同步（腾讯云版）</h1>
        <!-- 房主专属按钮 -->
        <div id="host-buttons" style="display: none;">
            <button class="btn generate-btn" onclick="generateRandomNumber()">生成随机数</button>
            <button class="btn reset-btn" onclick="resetRandomNumber()">重置</button>
        </div>
        <div class="random-num" id="random-number">--</div>
        <div class="status">当前状态：<span id="status">等待同步...</span></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- 引入腾讯云开发前端SDK（核心，无需密钥） -->
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <script src="https://imgcache.qq.com/qcloud/tcbjs/1.26.0/tcb.js"></script>
    <script>
        // ===================== 云开发配置（仅需环境ID，无密钥！）=====================
        const tcbConfig = {
            env: "sanjiaozhou-env-4g10z4vy00b2121e", // 替换为你的环境ID
            region: "ap-shanghai" // 替换为你的环境地域
        };

        // 初始化云开发
        const app = tcb.init(tcbConfig);
        // 获取数据库引用
        const db = app.database();
        // 引用random_number集合
        const randomNumCollection = db.collection('random_number');

        // ===================== 工具函数 =====================
        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 2000);
        }

        // ===================== 核心功能 =====================
        // 房主：生成随机数
        async function generateRandomNumber() {
            try {
                // 生成1-100随机数
                const randomNum = Math.floor(Math.random() * 100) + 1;

                // 1. 清空旧数据
                const oldDataRes = await randomNumCollection.get();
                if (oldDataRes.data.length > 0) {
                    for (const doc of oldDataRes.data) {
                        await randomNumCollection.doc(doc._id).remove();
                    }
                }

                // 2. 写入新随机数
                await randomNumCollection.add({
                    number: randomNum,
                    updateTime: new Date().toLocaleString(),
                    type: "generate"
                });

                // 更新前端显示
                document.getElementById("random-number").textContent = randomNum;
                showToast(`生成成功：${randomNum}`);
                document.getElementById("status").textContent = "已同步最新随机数";
            } catch (error) {
                showToast(`生成失败：${error.message}`);
                console.error("生成失败：", error);
            }
        }

        // 房主：重置随机数
        async function resetRandomNumber() {
            try {
                // 清空所有数据
                const oldDataRes = await randomNumCollection.get();
                if (oldDataRes.data.length > 0) {
                    for (const doc of oldDataRes.data) {
                        await randomNumCollection.doc(doc._id).remove();
                    }
                }

                // 写入重置标记
                await randomNumCollection.add({
                    number: "--",
                    updateTime: new Date().toLocaleString(),
                    type: "reset"
                });

                document.getElementById("random-number").textContent = "--";
                showToast("已重置");
                document.getElementById("status").textContent = "已重置，等待生成...";
            } catch (error) {
                showToast(`重置失败：${error.message}`);
                console.error("重置失败：", error);
            }
        }

        // 轮询获取最新随机数
        async function pollLatestNumber() {
            try {
                // 查询最新一条数据（按时间倒序）
                const res = await randomNumCollection.orderBy('updateTime', 'desc').limit(1).get();
                if (res.data.length > 0) {
                    const latestData = res.data[0];
                    document.getElementById("random-number").textContent = latestData.number;
                    document.getElementById("status").textContent = `最后更新：${latestData.updateTime}`;
                }
            } catch (error) {
                console.error("轮询失败：", error);
            }
        }

        // ===================== 页面初始化 =====================
        window.onload = async function() {
            // ========== 第一步：优先判断房主权限（不受登录影响） ==========
            const urlParams = new URLSearchParams(window.location.search);
            const isHost = urlParams.get("host") === "1";

            // 调试：打印权限判断结果
            console.log("是否为房主：", isHost);
            console.log("URL参数：", urlParams.toString());

            // 显示/隐藏房主按钮（无论登录是否成功，先判断权限）
            if (isHost) {
                document.getElementById("host-buttons").style.display = "block";
                document.getElementById("status").textContent = "你是房主，可生成随机数";
            }

            // ========== 第二步：初始化云开发登录 ==========
            try {
                await app.auth().anonymousAuthProvider().signIn();
                showToast(isHost ? "房主初始化成功" : "初始化成功");
            } catch (error) {
                showToast(`初始化失败：${error.message}`);
                console.error("登录失败：", error);
                // 即使登录失败，房主按钮依然显示（仅影响数据库操作）
                if (isHost) {
                    document.getElementById("status").textContent = "你是房主，但初始化失败，无法操作";
                }
            }

            // ========== 第三步：启动轮询 ==========
            pollLatestNumber();
            setInterval(pollLatestNumber, 2000);
        };
    </script>
</body>
</html>
